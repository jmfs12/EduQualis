<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQualis</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <div class="container" id="form-container">
        <h2 id="form-title">Login</h2>
        <form id="login-form">
            <label>
                <input type="text" id="log-name" placeholder="Username" required>
                <input type="password" id="log-password" placeholder="Senha" required>
            </label>
            <button type="submit">Login</button>
        </form>
        <form id="register-form" style="display:none">
            <label>
                <input type="text" id="reg-name" placeholder="username" required>
                <input type="email" id="reg-email" placeholder="email" required>
                <input type="password" id="reg-password" placeholder="senha" required>
            </label>
            <button type="submit">Registrar</button>
        </form>

        <div class="switch" onclick="toggleForms()">
            Não possui uma conta? Registre-se.
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
